<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Board — ENGSE207</title>
  <script src="config.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:sans-serif;background:#f0f2f5;color:#333}

    /* Login */
    #login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-box{background:#fff;border-radius:10px;padding:36px 32px;width:360px;box-shadow:0 4px 18px rgba(0,0,0,.13)}
    .login-box h2{text-align:center;margin-bottom:22px;font-size:21px}
    .login-footer{text-align:center;margin-top:14px;font-size:13px;color:#666}
    .login-footer a{color:#2c3e50;font-weight:700;text-decoration:none}
    #login-err{color:#dc2626;font-size:13px;margin-bottom:8px;min-height:18px}

    /* Header */
    header{background:#2c3e50;color:#fff;padding:13px 24px;display:flex;justify-content:space-between;align-items:center}
    header .logo{font-size:17px;font-weight:700}
    header nav a{color:#bdc3c7;text-decoration:none;margin-left:18px;font-size:14px}
    header nav a:hover{color:#fff}

    /* Layout */
    .container{max-width:820px;margin:28px auto;padding:0 16px}
    .card{background:#fff;border-radius:8px;padding:20px 24px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.09)}
    .card h2{font-size:16px;margin-bottom:14px;color:#2c3e50}

    /* Form */
    input,textarea,select{width:100%;padding:8px 11px;margin-bottom:10px;border:1px solid #ccc;border-radius:6px;font-size:14px}
    input:focus,textarea:focus{outline:none;border-color:#2c3e50}

    /* Buttons */
    .btn{padding:8px 18px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600}
    .btn-primary{background:#2c3e50;color:#fff}.btn-primary:hover{background:#34495e}
    .btn-danger{background:#e74c3c;color:#fff}.btn-danger:hover{background:#c0392b}
    .btn-warn{background:#e67e22;color:#fff}.btn-warn:hover{background:#ca6f1e}
    .btn-full{width:100%;padding:10px}

    /* Task items */
    .task-item{border:1px solid #e8e8e8;border-radius:7px;padding:13px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;transition:box-shadow .15s}
    .task-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .task-title{font-weight:700;font-size:15px}
    .task-desc{color:#777;font-size:13px;margin-top:3px}
    .task-meta{font-size:11px;color:#aaa;margin-top:5px}
    .badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700;margin-top:5px}
    .badge-todo{background:#fef9c3;color:#854d0e}
    .badge-in-progress{background:#dbeafe;color:#1e40af}
    .badge-done{background:#dcfce7;color:#166534}
    .task-actions{display:flex;gap:6px;flex-shrink:0;margin-left:12px}

    /* Alert */
    #alert{padding:10px 14px;border-radius:6px;margin-bottom:14px;font-size:14px;display:none}
    .alert-ok{background:#d1fae5;color:#065f46}
    .alert-err{background:#fee2e2;color:#991b1b}
    .empty{text-align:center;color:#aaa;padding:24px 0;font-size:14px}
  </style>
</head>
<body>

<!-- ── Login ─────────────────────────────────────────────── -->
<div id="login-wrap">
  <div class="login-box">
    <h2>🔐 เข้าสู่ระบบ</h2>
    <div id="login-err"></div>
    <input type="email"    id="l-email" placeholder="Email"/>
    <input type="password" id="l-pass"  placeholder="Password"
           onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn btn-primary btn-full" onclick="login()">Login</button>
    <div class="login-footer">
      ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a>
    </div>
  </div>
</div>

<!-- ── App ───────────────────────────────────────────────── -->
<div id="app" style="display:none">
  <header>
    <span class="logo">📋 Task Board</span>
    <nav>
      <a href="activity.html">⚡ Activities</a>
      <a href="#" onclick="logout()">
        ออกจากระบบ (<span id="user-label"></span>)
      </a>
    </nav>
  </header>

  <div class="container">
    <div id="alert"></div>

    <div class="card">
      <h2>➕ สร้าง Task ใหม่</h2>
      <input    type="text" id="t-title"  placeholder="ชื่อ task *"/>
      <textarea             id="t-desc"   placeholder="รายละเอียด (ไม่บังคับ)" rows="2"></textarea>
      <select id="t-status">
        <option value="todo">Todo</option>
        <option value="in-progress">In Progress</option>
        <option value="done">Done</option>
      </select>
      <button class="btn btn-primary" onclick="createTask()">สร้าง Task</button>
    </div>

    <div class="card">
      <h2>📋 รายการ Task ทั้งหมด</h2>
      <div id="task-list"><p class="empty">กำลังโหลด...</p></div>
    </div>
  </div>
</div>

<script>
let TOKEN = sessionStorage.getItem('token');
let USER  = JSON.parse(sessionStorage.getItem('user') || 'null');

window.onload = () => { if (TOKEN) showApp(); };

// ── Auth ──────────────────────────────────────────────────
async function login() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';
  try {
    const res  = await fetch(`${CONFIG.AUTH_URL}/api/auth/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, password: pass }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'เข้าสู่ระบบไม่สำเร็จ'; return; }
    TOKEN = data.token; USER = data.user;
    sessionStorage.setItem('token', TOKEN);
    sessionStorage.setItem('user', JSON.stringify(USER));
    showApp();
  } catch { errEl.textContent = 'เชื่อมต่อเซิร์ฟเวอร์ไม่ได้'; }
}

function showApp() {
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('app').style.display        = 'block';
  document.getElementById('user-label').textContent   = USER?.username || '';
  loadTasks();
}
function logout() { sessionStorage.clear(); location.reload(); }

// ── Alert ─────────────────────────────────────────────────
function showAlert(msg, ok = true) {
  const el = document.getElementById('alert');
  el.textContent = msg; el.className = ok ? 'alert-ok' : 'alert-err';
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

// ── Tasks ─────────────────────────────────────────────────
async function loadTasks() {
  const el = document.getElementById('task-list');
  try {
    const res   = await fetch(`${CONFIG.TASK_URL}/api/tasks/`, {
      headers: {'Authorization': `Bearer ${TOKEN}`},
    });
    if (res.status === 401) { logout(); return; }
    const tasks = await res.json();
    if (!tasks.length) { el.innerHTML = '<p class="empty">ยังไม่มี task</p>'; return; }
    el.innerHTML = tasks.map(t => `
      <div class="task-item">
        <div style="flex:1">
          <div class="task-title">${esc(t.title)}</div>
          ${t.description ? `<div class="task-desc">${esc(t.description)}</div>` : ''}
          <span class="badge badge-${t.status}">${t.status}</span>
          <div class="task-meta">สร้างเมื่อ ${fmt(t.created_at)}</div>
        </div>
        <div class="task-actions">
          <button class="btn btn-warn"    onclick="cycleStatus(${t.id},'${t.status}')">เปลี่ยนสถานะ</button>
          <button class="btn btn-danger"  onclick="deleteTask(${t.id})">ลบ</button>
        </div>
      </div>`).join('');
  } catch { el.innerHTML = '<p class="empty" style="color:red">โหลดไม่สำเร็จ</p>'; }
}

async function createTask() {
  const title  = document.getElementById('t-title').value.trim();
  const desc   = document.getElementById('t-desc').value.trim();
  const status = document.getElementById('t-status').value;
  if (!title) { showAlert('กรุณากรอกชื่อ task', false); return; }
  try {
    const res  = await fetch(`${CONFIG.TASK_URL}/api/tasks/`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`},
      body: JSON.stringify({ title, description: desc, status }),
    });
    const data = await res.json();
    if (!res.ok) { showAlert(data.error, false); return; }
    document.getElementById('t-title').value = '';
    document.getElementById('t-desc').value  = '';
    showAlert('สร้าง task สำเร็จ ✅'); loadTasks();
  } catch { showAlert('เกิดข้อผิดพลาด', false); }
}

async function cycleStatus(id, cur) {
  const next = cur === 'todo' ? 'in-progress' : cur === 'in-progress' ? 'done' : 'todo';
  try {
    const res = await fetch(`${CONFIG.TASK_URL}/api/tasks/${id}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`},
      body: JSON.stringify({ status: next }),
    });
    if (!res.ok) { showAlert('อัปเดตไม่สำเร็จ', false); return; }
    showAlert(`เปลี่ยนสถานะเป็น "${next}" สำเร็จ`); loadTasks();
  } catch { showAlert('เกิดข้อผิดพลาด', false); }
}

async function deleteTask(id) {
  if (!confirm('ยืนยันลบ task นี้?')) return;
  try {
    const res = await fetch(`${CONFIG.TASK_URL}/api/tasks/${id}`, {
      method: 'DELETE', headers: {'Authorization':`Bearer ${TOKEN}`},
    });
    if (!res.ok) { showAlert('ลบไม่สำเร็จ', false); return; }
    showAlert('ลบ task สำเร็จ'); loadTasks();
  } catch { showAlert('เกิดข้อผิดพลาด', false); }
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function fmt(d){ return new Date(d).toLocaleString('th-TH') }
</script>
</body>
</html>
