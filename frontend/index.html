<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 Task Board — Final Lab Sec2 Set 2</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface2: #273448;
      --border: #334155; --text: #e2e8f0; --muted: #94a3b8;
      --blue: #3b82f6; --green: #22c55e; --yellow: #f59e0b;
      --red: #ef4444; --purple: #a855f7; --teal: #14b8a6;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    #auth-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 1rem; padding: 2rem; width: 100%; max-width: 420px; }
    .auth-logo { font-size: 2.5rem; text-align: center; margin-bottom: .5rem; }
    .auth-title { font-size: 1.15rem; font-weight: 700; text-align: center; margin-bottom: 1.25rem; }
    .tabs { display: flex; gap: .5rem; margin-bottom: 1.25rem; }
    .tab { flex: 1; padding: .5rem; border: 1px solid var(--border); border-radius: .5rem; background: transparent; color: var(--muted); cursor: pointer; font-size: .88rem; font-weight: 600; transition: all .15s; }
    .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    .form-group { margin-bottom: .85rem; }
    .form-group label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: .3rem; }
    .form-group input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: .6rem .75rem; border-radius: .5rem; font-size: .9rem; outline: none; transition: border-color .2s; }
    .form-group input:focus { border-color: var(--blue); }
    .btn-primary { width: 100%; background: var(--blue); color: #fff; border: none; padding: .7rem; border-radius: .5rem; font-size: .95rem; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { opacity: .85; }
    .auth-msg { margin-top: .65rem; padding: .45rem .75rem; border-radius: .4rem; font-size: .83rem; text-align: center; }
    .auth-msg.error   { background: rgba(239,68,68,.15);  color: var(--red); }
    .auth-msg.success { background: rgba(34,197,94,.15);  color: var(--green); }
    #app-page { display: flex; height: 100vh; }
    .hidden { display: none !important; }
    .sidebar { width: 230px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-logo { padding: 1.25rem 1rem; font-size: 1rem; font-weight: 700; border-bottom: 1px solid var(--border); }
    .sidebar-nav { flex: 1; padding: .5rem; display: flex; flex-direction: column; gap: .25rem; }
    .nav-item { display: flex; align-items: center; gap: .65rem; padding: .6rem .85rem; border-radius: .5rem; border: none; background: transparent; color: var(--muted); font-size: .88rem; cursor: pointer; transition: background .15s, color .15s; text-decoration: none; width: 100%; text-align: left; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(59,130,246,.15); color: var(--blue); }
    .sidebar-footer { padding: .75rem; border-top: 1px solid var(--border); }
    .user-chip { display: flex; align-items: center; gap: .6rem; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .85rem; flex-shrink: 0; }
    .user-chip > div { flex: 1; overflow: hidden; }
    .user-chip > div > div:first-child { font-size: .85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-chip button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; }
    .role-badge { font-size: .68rem; font-weight: 700; padding: .1rem .45rem; border-radius: .3rem; }
    .role-member { background: rgba(59,130,246,.15); color: var(--blue); }
    .role-admin  { background: rgba(168,85,247,.15); color: var(--purple); }
    .main-content { flex: 1; overflow-y: auto; padding: 1.5rem; }
    .page-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: space-between; }
    .btn { padding: .45rem 1rem; border-radius: .5rem; border: none; cursor: pointer; font-size: .85rem; font-weight: 600; }
    .btn:hover { opacity: .85; }
    .btn-sm { padding: .3rem .65rem; font-size: .78rem; }
    .btn-blue { background: var(--blue); color: #fff; }
    .btn-red  { background: var(--red);  color: #fff; }
    .btn-gray { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .tasks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
    .task-card { background: var(--surface); border: 1px solid var(--border); border-radius: .75rem; padding: 1rem; }
    .task-title { font-size: .95rem; font-weight: 600; margin-bottom: .5rem; }
    .task-desc  { font-size: .82rem; color: var(--muted); margin-bottom: .65rem; line-height: 1.4; }
    .task-meta  { display: flex; flex-wrap: wrap; gap: .35rem; margin-bottom: .65rem; }
    .chip { font-size: .72rem; padding: .2rem .5rem; border-radius: .3rem; font-weight: 600; }
    .chip-todo        { background: rgba(148,163,184,.15); color: var(--muted); }
    .chip-in_progress { background: rgba(245,158,11,.15);  color: var(--yellow); }
    .chip-done        { background: rgba(34,197,94,.15);   color: var(--green); }
    .chip-high   { background: rgba(239,68,68,.15);  color: var(--red); }
    .chip-medium { background: rgba(245,158,11,.15); color: var(--yellow); }
    .chip-low    { background: rgba(34,197,94,.15);  color: var(--green); }
    .chip-owner  { background: rgba(59,130,246,.1);  color: var(--blue); }
    .task-actions { display: flex; gap: .4rem; }
    .empty-state { text-align: center; padding: 3rem; color: var(--muted); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1rem; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: .75rem; padding: 1.5rem; width: 100%; max-width: 440px; }
    .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
    .modal select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: .6rem .75rem; border-radius: .5rem; font-size: .9rem; outline: none; }
    .modal-actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: 1rem; }
    #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; display: flex; flex-direction: column; gap: .5rem; z-index: 999; }
    .toast { padding: .65rem 1rem; border-radius: .5rem; font-size: .85rem; font-weight: 600; animation: slideIn .2s ease; }
    .toast-success { background: rgba(34,197,94,.9);  color: #fff; }
    .toast-error   { background: rgba(239,68,68,.9);  color: #fff; }
    .toast-info    { background: rgba(59,130,246,.9); color: #fff; }
    @keyframes slideIn { from { opacity:0; transform:translateX(1rem); } to { opacity:1; transform:translateX(0); } }
  </style>
</head>
<body>
<script src="config.js"></script>

<!-- ════ AUTH PAGE ════ -->
<div id="auth-page">
  <div class="auth-box">
    <div class="auth-logo">🔐</div>
    <div class="auth-title">Task Board — Sec2 Set 2</div>
    <div class="tabs">
      <button class="tab active" id="tab-login"    onclick="switchTab('login')">เข้าสู่ระบบ</button>
      <button class="tab"        id="tab-register" onclick="switchTab('register')">สมัครสมาชิก</button>
    </div>

    <!-- Login -->
    <div id="login-form">
      <div class="form-group"><label>Email</label>
        <input id="login-email" type="email" value="alice@lab.local"></div>
      <div class="form-group"><label>Password</label>
        <input id="login-password" type="password" value="alice123"
               onkeydown="if(event.key==='Enter') doLogin()"></div>
      <button class="btn-primary" onclick="doLogin()">เข้าสู่ระบบ</button>
      <div style="margin-top:.65rem;padding:.55rem;background:rgba(59,130,246,.08);border-radius:.5rem;font-size:.78rem;color:var(--muted)">
        Seed: alice@lab.local/alice123 · admin@lab.local/adminpass
      </div>
    </div>

    <!-- Register -->
    <div id="register-form" class="hidden">
      <div class="form-group"><label>Username</label>
        <input id="reg-name" type="text" placeholder="ชื่อผู้ใช้"></div>
      <div class="form-group"><label>Email</label>
        <input id="reg-email" type="email" placeholder="email@example.com"></div>
      <div class="form-group"><label>Password (อย่างน้อย 6 ตัวอักษร)</label>
        <input id="reg-password" type="password" placeholder="password"
               onkeydown="if(event.key==='Enter') doRegister()"></div>
      <button class="btn-primary" onclick="doRegister()">สมัครสมาชิก</button>
    </div>

    <div id="auth-msg"></div>
  </div>
</div>

<!-- ════ MAIN APP ════ -->
<div id="app-page" class="hidden">
  <nav class="sidebar">
    <div class="sidebar-logo">📋 Task Board</div>
    <div class="sidebar-nav">
      <button class="nav-item active" data-page="tasks" onclick="showPage('tasks')">
        <span>✅</span> Tasks
        <span class="badge-count" id="task-count" style="margin-left:auto;background:rgba(59,130,246,.2);color:var(--blue);font-size:.7rem;padding:.1rem .45rem;border-radius:.3rem;display:none">0</span>
      </button>
      <!-- ❌ ไม่มี Profile tab (ไม่มี User Service ใน Sec2 Set 2) -->
      <!-- ✅ Activity Timeline link -->
      <a href="activity.html" target="_blank" class="nav-item" style="text-decoration:none">
        <span>📅</span> Activity Timeline
        <span style="margin-left:auto;font-size:.7rem;color:var(--muted)">↗</span>
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="sidebar-avatar">?</div>
        <div>
          <div id="sidebar-name">—</div>
          <span class="role-badge" id="sidebar-role-badge">—</span>
        </div>
        <button onclick="doLogout()" title="Logout">✕</button>
      </div>
    </div>
  </nav>

  <div class="main-content">
    <div id="page-tasks">
      <div class="page-title">
        <span>✅ Tasks</span>
        <button class="btn btn-blue" onclick="openCreateModal()">+ สร้าง Task</button>
      </div>
      <div id="tasks-container"><div class="empty-state">⏳ กำลังโหลด...</div></div>
    </div>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay hidden" id="task-modal">
  <div class="modal">
    <h3 id="modal-title">สร้าง Task ใหม่</h3>
    <div class="form-group"><label>ชื่อ Task *</label><input id="m-title" type="text"></div>
    <div class="form-group"><label>รายละเอียด</label><input id="m-desc" type="text"></div>
    <div class="form-group"><label>Status</label>
      <select id="m-status">
        <option value="TODO">TODO</option>
        <option value="IN_PROGRESS">IN_PROGRESS</option>
        <option value="DONE">DONE</option>
      </select>
    </div>
    <div class="form-group"><label>Priority</label>
      <select id="m-priority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gray" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-blue" onclick="submitTask()">บันทึก</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal-overlay hidden" id="confirm-modal">
  <div class="modal">
    <h3>⚠️ ยืนยันการลบ</h3>
    <p style="color:var(--muted);font-size:.9rem;margin-bottom:1rem">คุณแน่ใจหรือไม่ว่าต้องการลบ Task นี้?</p>
    <div class="modal-actions">
      <button class="btn btn-gray" onclick="closeConfirm()">ยกเลิก</button>
      <button class="btn btn-red" id="confirm-delete-btn">ลบ</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
const AUTH     = window.APP_CONFIG.AUTH_URL;
const TASK     = window.APP_CONFIG.TASK_URL;
const ACTIVITY = window.APP_CONFIG.ACTIVITY_URL;

let token = localStorage.getItem('jwt_token');
let currentUser = null;
let editingTaskId = null;

function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
}

// ── Auth tabs ─────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('auth-msg').textContent = '';
}

function showAuthMsg(msg, type) {
  const el = document.getElementById('auth-msg');
  el.className = `auth-msg ${type}`;
  el.textContent = msg;
}

async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showAuthMsg('กรุณากรอกข้อมูลให้ครบ', 'error'); return; }
  try {
    const res  = await fetch(`${AUTH}/api/auth/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (res.ok) {
      token = data.token; localStorage.setItem('jwt_token', token); initApp(data.user);
    } else {
      showAuthMsg('❌ ' + (data.error || 'Login ล้มเหลว'), 'error');
    }
  } catch (e) { showAuthMsg('❌ ไม่สามารถเชื่อมต่อ server', 'error'); }
}

async function doRegister() {
  const username = document.getElementById('reg-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!username || !email || !password) { showAuthMsg('กรุณากรอกข้อมูลให้ครบ', 'error'); return; }
  try {
    const res  = await fetch(`${AUTH}/api/auth/register`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });
    const data = await res.json();
    if (res.ok) {
      showAuthMsg('✅ สมัครสมาชิกสำเร็จ! กำลังเข้าสู่ระบบ...', 'success');
      // register ไม่คืน token → login ต่อทันที
      const loginRes  = await fetch(`${AUTH}/api/auth/login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const loginData = await loginRes.json();
      if (loginRes.ok) {
        token = loginData.token; localStorage.setItem('jwt_token', token); initApp(loginData.user);
      }
    } else {
      showAuthMsg('❌ ' + (data.error || 'สมัครไม่สำเร็จ'), 'error');
    }
  } catch (e) { showAuthMsg('❌ ไม่สามารถเชื่อมต่อ server', 'error'); }
}

function doLogout() {
  localStorage.removeItem('jwt_token'); token = null; currentUser = null;
  document.getElementById('app-page').classList.add('hidden');
  document.getElementById('auth-page').classList.remove('hidden');
}

function initApp(user) {
  currentUser = user;
  document.getElementById('auth-page').classList.add('hidden');
  document.getElementById('app-page').classList.remove('hidden');
  const initial = (user.username || user.email || '?').charAt(0).toUpperCase();
  document.getElementById('sidebar-avatar').textContent = initial;
  document.getElementById('sidebar-name').textContent   = user.username || user.email;
  const rb = document.getElementById('sidebar-role-badge');
  rb.textContent = user.role;
  rb.className   = `role-badge role-${user.role}`;
  showPage('tasks');
}

function showPage(page) {
  ['tasks'].forEach(p => {
    document.getElementById(`page-${p}`).classList.toggle('hidden', p !== page);
    const btn = document.querySelector(`[data-page="${p}"]`);
    if (btn) btn.classList.toggle('active', p === page);
  });
  if (page === 'tasks') loadTasks();
}

// ── Tasks ─────────────────────────────────────────────────────────────
async function loadTasks() {
  try {
    const res  = await fetch(`${TASK}/api/tasks/`, { headers: authHeaders() });
    if (res.status === 401) { doLogout(); return; }
    const data = await res.json();
    renderTasks(data.tasks || []);
    const cnt = document.getElementById('task-count');
    cnt.textContent = data.count || 0;
    cnt.style.display = data.count ? 'inline' : 'none';
  } catch (e) {
    document.getElementById('tasks-container').innerHTML = '<div class="empty-state">❌ โหลดไม่สำเร็จ</div>';
  }
}

function renderTasks(tasks) {
  const c = document.getElementById('tasks-container');
  if (!tasks.length) { c.innerHTML = '<div class="empty-state">📭 ยังไม่มี Task<br><small>กดปุ่ม "+ สร้าง Task" เพื่อเริ่มต้น</small></div>'; return; }
  c.innerHTML = '<div class="tasks-grid">' + tasks.map(t => `
    <div class="task-card">
      <div class="task-title">${escHtml(t.title)}</div>
      ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ''}
      <div class="task-meta">
        <span class="chip chip-${(t.status||'').toLowerCase()}">${t.status}</span>
        <span class="chip chip-${t.priority}">${t.priority}</span>
        <span class="chip chip-owner">👤 ${escHtml(t.username || String(t.user_id))}</span>
      </div>
      <div class="task-actions">
        <button class="btn btn-sm btn-gray" onclick="openEditModal(${t.id},'${escHtml(t.title)}','${escHtml(t.description||'')}','${t.status}','${t.priority}')">✏️ แก้ไข</button>
        <button class="btn btn-sm btn-red"  onclick="confirmDelete(${t.id})">🗑️ ลบ</button>
      </div>
    </div>`).join('') + '</div>';
}

function openCreateModal() {
  editingTaskId = null;
  document.getElementById('modal-title').textContent = 'สร้าง Task ใหม่';
  document.getElementById('m-title').value    = '';
  document.getElementById('m-desc').value     = '';
  document.getElementById('m-status').value   = 'TODO';
  document.getElementById('m-priority').value = 'medium';
  document.getElementById('task-modal').classList.remove('hidden');
}
function openEditModal(id, title, desc, status, priority) {
  editingTaskId = id;
  document.getElementById('modal-title').textContent = 'แก้ไข Task';
  document.getElementById('m-title').value    = title;
  document.getElementById('m-desc').value     = desc;
  document.getElementById('m-status').value   = status;
  document.getElementById('m-priority').value = priority;
  document.getElementById('task-modal').classList.remove('hidden');
}
function closeModal()   { document.getElementById('task-modal').classList.add('hidden'); }
function closeConfirm() { document.getElementById('confirm-modal').classList.add('hidden'); }

function confirmDelete(id) {
  document.getElementById('confirm-modal').classList.remove('hidden');
  document.getElementById('confirm-delete-btn').onclick = () => deleteTask(id);
}

async function submitTask() {
  const title       = document.getElementById('m-title').value.trim();
  const description = document.getElementById('m-desc').value.trim();
  const status      = document.getElementById('m-status').value;
  const priority    = document.getElementById('m-priority').value;
  if (!title) { toast('กรุณากรอกชื่อ Task', 'error'); return; }
  const url    = editingTaskId ? `${TASK}/api/tasks/${editingTaskId}` : `${TASK}/api/tasks/`;
  const method = editingTaskId ? 'PUT' : 'POST';
  try {
    const res  = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify({ title, description, status, priority }) });
    const data = await res.json();
    if (res.ok) { toast(editingTaskId ? '✅ แก้ไขสำเร็จ' : '✅ สร้างสำเร็จ', 'success'); closeModal(); loadTasks(); }
    else toast('❌ ' + (data.error || 'เกิดข้อผิดพลาด'), 'error');
  } catch (e) { toast('❌ ไม่สามารถเชื่อมต่อ server', 'error'); }
}

async function deleteTask(id) {
  closeConfirm();
  try {
    const res = await fetch(`${TASK}/api/tasks/${id}`, { method: 'DELETE', headers: authHeaders() });
    if (res.ok) { toast('🗑️ ลบสำเร็จ', 'success'); loadTasks(); }
    else { const d = await res.json(); toast('❌ ' + (d.error || 'ลบไม่สำเร็จ'), 'error'); }
  } catch (e) { toast('❌ error', 'error'); }
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`; el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// Auto-login
if (token) {
  (async () => {
    try {
      const res  = await fetch(`${AUTH}/api/auth/verify`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (data.valid) initApp(data.user);
      else { localStorage.removeItem('jwt_token'); token = null; }
    } catch (_) { localStorage.removeItem('jwt_token'); token = null; }
  })();
}
</script>
</body>
</html>
