<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>สมัครสมาชิก — ENGSE207</title>
  <script src="config.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:sans-serif;background:#f0f2f5;display:flex;justify-content:center;align-items:center;min-height:100vh}
    .card{background:#fff;border-radius:10px;padding:36px 32px;width:380px;box-shadow:0 4px 18px rgba(0,0,0,.13)}
    h2{margin-bottom:22px;font-size:21px;text-align:center}
    input{width:100%;padding:9px 12px;margin-bottom:12px;border:1px solid #ccc;border-radius:6px;font-size:14px}
    input:focus{outline:none;border-color:#2c3e50}
    button{width:100%;padding:11px;background:#2c3e50;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer}
    button:hover{background:#34495e}
    #msg{padding:9px 12px;border-radius:6px;margin-bottom:12px;font-size:13px;display:none}
    .ok {background:#d1fae5;color:#065f46;display:block!important}
    .err{background:#fee2e2;color:#991b1b;display:block!important}
    .footer{text-align:center;margin-top:16px;font-size:13px;color:#666}
    .footer a{color:#2c3e50;font-weight:700;text-decoration:none}
    .hint{font-size:11px;color:#aaa;margin-top:-8px;margin-bottom:10px}
  </style>
</head>
<body>
  <div class="card">
    <h2>📝 สมัครสมาชิก</h2>
    <div id="msg"></div>
    <input type="text"     id="username" placeholder="Username *"/>
    <input type="email"    id="email"    placeholder="Email *"/>
    <input type="password" id="password" placeholder="Password * (อย่างน้อย 6 ตัว)"/>
    <input type="password" id="confirm"  placeholder="ยืนยัน Password *"/>
    <button onclick="register()">สมัครสมาชิก</button>
    <div class="footer">มีบัญชีแล้ว? <a href="index.html">เข้าสู่ระบบ</a></div>
  </div>

  <script>
  async function register() {
    const username = document.getElementById('username').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;

    if (!username || !email || !password || !confirm)
      return showMsg('กรุณากรอกข้อมูลให้ครบทุกช่อง', false);
    if (password.length < 6)
      return showMsg('Password ต้องมีอย่างน้อย 6 ตัวอักษร', false);
    if (password !== confirm)
      return showMsg('Password และยืนยัน Password ไม่ตรงกัน', false);

    try {
      const res  = await fetch(`${CONFIG.AUTH_URL}/api/auth/register`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ username, email, password }),
      });
      const data = await res.json();
      if (!res.ok) return showMsg(data.error || 'สมัครสมาชิกไม่สำเร็จ', false);

      sessionStorage.setItem('token', data.token);
      sessionStorage.setItem('user',  JSON.stringify(data.user));
      showMsg('สมัครสมาชิกสำเร็จ! กำลังพาไปหน้าหลัก...', true);
      setTimeout(() => location.href = 'index.html', 1200);
    } catch { showMsg('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้', false); }
  }

  function showMsg(text, ok) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className   = ok ? 'ok' : 'err';
  }
  </script>
</body>
</html>
