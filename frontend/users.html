<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👥 Users — Final Lab Set 2</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0f172a; --surface:#1e293b; --border:#334155; --text:#e2e8f0; --muted:#94a3b8; --blue:#3b82f6; --green:#22c55e; --purple:#a855f7; --red:#ef4444; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .header { background:var(--surface); border-bottom:1px solid var(--border); padding:.85rem 1.5rem; display:flex; justify-content:space-between; align-items:center; }
    .header h1 { font-size:1.1rem; font-weight:700; }
    .container { max-width:900px; margin:0 auto; padding:1.5rem; }
    .user-card { background:var(--surface); border:1px solid var(--border); border-radius:.75rem; padding:1rem 1.25rem; margin-bottom:.75rem; display:flex; align-items:center; gap:1rem; }
    .avatar { width:40px; height:40px; border-radius:50%; background:var(--blue); display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; }
    .user-info { flex:1; }
    .user-name  { font-weight:600; font-size:.95rem; }
    .user-email { font-size:.8rem; color:var(--muted); }
    .user-bio   { font-size:.8rem; color:var(--muted); margin-top:.2rem; }
    .role-badge { font-size:.68rem; font-weight:700; padding:.1rem .45rem; border-radius:.3rem; }
    .role-member { background:rgba(59,130,246,.15); color:var(--blue); }
    .role-admin  { background:rgba(168,85,247,.15); color:var(--purple); }
    .empty { text-align:center; padding:3rem; color:var(--muted); }
    .btn { padding:.4rem .9rem; border-radius:.5rem; border:none; cursor:pointer; font-size:.83rem; font-weight:600; }
    .btn-secondary { background:var(--surface); color:var(--text); border:1px solid var(--border); }
    #login-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:100; }
    .login-box { background:var(--surface); border:1px solid var(--border); border-radius:1rem; padding:2rem; width:100%; max-width:340px; }
    .login-box h2 { margin-bottom:1.25rem; }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-size:.82rem; color:var(--muted); margin-bottom:.3rem; }
    .form-group input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:.6rem .75rem; border-radius:.5rem; font-size:.9rem; outline:none; }
    .btn-primary { background:var(--blue); color:#fff; width:100%; padding:.65rem; border:none; border-radius:.5rem; font-size:.9rem; font-weight:600; cursor:pointer; }
    .error-text { color:var(--red); font-size:.82rem; margin-top:.5rem; }
    .admin-notice { background:rgba(168,85,247,.1); border:1px solid rgba(168,85,247,.3); border-radius:.5rem; padding:.65rem 1rem; font-size:.82rem; color:var(--purple); margin-bottom:1rem; }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <h2>👥 Users</h2>
    <div class="form-group"><label>Email</label><input id="l-email" type="email" value="admin@lab.local"></div>
    <div class="form-group"><label>Password</label>
      <input id="l-pass" type="password" value="adminpass" onkeydown="if(event.key==='Enter') pageLogin()">
    </div>
    <button class="btn-primary" onclick="pageLogin()">เข้าสู่ระบบ</button>
    <p class="error-text" id="l-err"></p>
  </div>
</div>

<div class="header">
  <h1>👥 Users — Task Board Set 2</h1>
  <div style="display:flex;gap:1rem;align-items:center">
    <span id="logged-as" style="font-size:.82rem;color:var(--muted)"></span>
    <a href="index.html" style="color:var(--blue);font-size:.85rem;text-decoration:none">← Task Board</a>
  </div>
</div>

<div class="container">
  <div id="admin-notice" class="admin-notice hidden">👑 Admin Mode — แสดงผู้ใช้ทั้งหมด</div>
  <div id="users-container"><div class="empty">⏳ กำลังโหลด...</div></div>
</div>

<script>
const API = '';
let token = localStorage.getItem('jwt_token');

async function pageLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  try {
    const res  = await fetch(`${API}/api/auth/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (res.ok) {
      token = data.token; localStorage.setItem('jwt_token', token);
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('logged-as').textContent = `👤 ${data.user.username} (${data.user.role})`;
      if (data.user.role === 'admin') document.getElementById('admin-notice').classList.remove('hidden');
      loadUsers();
    } else {
      document.getElementById('l-err').textContent = data.error || 'Login ล้มเหลว';
    }
  } catch (e) { document.getElementById('l-err').textContent = 'ไม่สามารถเชื่อมต่อ server'; }
}

async function loadUsers() {
  try {
    const res  = await fetch(`${API}/api/users/`, { headers: { Authorization: `Bearer ${token}` } });
    if (res.status === 403) {
      // member — แสดงเฉพาะ profile ตัวเอง
      const me = await fetch(`${API}/api/users/me`, { headers: { Authorization: `Bearer ${token}` } });
      const d  = await me.json();
      renderUsers([d.profile]);
      return;
    }
    const data = await res.json();
    renderUsers(data.users || []);
  } catch (e) {
    document.getElementById('users-container').innerHTML = '<div class="empty">❌ โหลดไม่สำเร็จ</div>';
  }
}

function renderUsers(users) {
  const c = document.getElementById('users-container');
  if (!users.length) { c.innerHTML = '<div class="empty">📭 ไม่พบผู้ใช้</div>'; return; }
  c.innerHTML = users.map(u => `
    <div class="user-card">
      <div class="avatar">${escHtml((u.username||'?').charAt(0).toUpperCase())}</div>
      <div class="user-info">
        <div class="user-name">${escHtml(u.username||'—')}</div>
        <div class="user-email">${escHtml(u.email||'—')}</div>
        ${u.bio ? `<div class="user-bio">${escHtml(u.bio)}</div>` : ''}
      </div>
      <span class="role-badge role-${u.role||'member'}">${u.role||'member'}</span>
    </div>`).join('');
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

if (token) {
  (async () => {
    try {
      const res  = await fetch(`${API}/api/auth/verify`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (data.valid) {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('logged-as').textContent = `👤 ${data.user.username} (${data.user.role})`;
        if (data.user.role === 'admin') document.getElementById('admin-notice').classList.remove('hidden');
        loadUsers();
      } else { localStorage.removeItem('jwt_token'); token = null; }
    } catch (_) { localStorage.removeItem('jwt_token'); token = null; }
  })();
}
</script>
</body>
</html>
