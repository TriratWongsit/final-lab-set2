limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/m;

server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;

    # ── Frontend (static files) ───────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Auth: login + register (rate-limited) ────────────────────
    location ~ ^/api/auth/(login|register)$ {
        limit_req zone=login_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://auth-service:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Auth: other endpoints ─────────────────────────────────────
    location /api/auth/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass         http://auth-service:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Task Service ──────────────────────────────────────────────
    location /api/tasks/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://task-service:3002;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Block /api/activity/internal จากภายนอก ───────────────────
    location = /api/activity/internal {
        return 403;
    }

    # ── Activity Service ──────────────────────────────────────────
    location /api/activity/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://activity-service:3003;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    error_page 429 /429.json;
    location = /429.json {
        return 429 '{"error":"Too Many Requests","retryAfter":60}';
        add_header Content-Type application/json;
    }
}
