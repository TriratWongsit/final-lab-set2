services:

  # ══════════════════════════════════════════════
  # DATABASES (แยกต่อ service — Database per Service)
  # ══════════════════════════════════════════════

  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       auth_db
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./db/auth/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [taskboard-net]

  user-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       user_db
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - user_db_data:/var/lib/postgresql/data
      - ./db/user/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [taskboard-net]

  task-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       task_db
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - task_db_data:/var/lib/postgresql/data
      - ./db/task/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d task_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [taskboard-net]

  log-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       log_db
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - log_db_data:/var/lib/postgresql/data
      - ./db/log/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d log_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [taskboard-net]

  # ══════════════════════════════════════════════
  # SERVICES
  # ══════════════════════════════════════════════

  auth-service:
    build: ./auth-service
    environment:
      DB_HOST:     auth-db
      DB_PORT:     5432
      DB_NAME:     auth_db
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET:  ${JWT_SECRET}
      JWT_EXPIRES: ${JWT_EXPIRES}
      PORT:        3001
    depends_on:
      auth-db: { condition: service_healthy }
    networks: [taskboard-net]
    restart: unless-stopped

  user-service:
    build: ./user-service
    environment:
      DB_HOST:     user-db
      DB_PORT:     5432
      DB_NAME:     user_db
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET:  ${JWT_SECRET}
      PORT:        3004
    depends_on:
      user-db: { condition: service_healthy }
    networks: [taskboard-net]
    restart: unless-stopped

  task-service:
    build: ./task-service
    environment:
      DB_HOST:     task-db
      DB_PORT:     5432
      DB_NAME:     task_db
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET:  ${JWT_SECRET}
      PORT:        3002
    depends_on:
      task-db: { condition: service_healthy }
    networks: [taskboard-net]
    restart: unless-stopped

  log-service:
    build: ./log-service
    environment:
      DB_HOST:     log-db
      DB_PORT:     5432
      DB_NAME:     log_db
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET:  ${JWT_SECRET}
      PORT:        3003
    depends_on:
      log-db: { condition: service_healthy }
    networks: [taskboard-net]
    restart: unless-stopped

  frontend:
    build: ./frontend
    networks: [taskboard-net]

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - auth-service
      - user-service
      - task-service
      - log-service
      - frontend
    networks: [taskboard-net]
    restart: unless-stopped

volumes:
  auth_db_data:
  user_db_data:
  task_db_data:
  log_db_data:

networks:
  taskboard-net:
    driver: bridge
