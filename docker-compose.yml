version: '3.8'

services:
  # ── Databases ─────────────────────────────────────────────
  auth-db:
    image: postgres:15
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret123}
    volumes:
      - auth-pgdata:/var/lib/postgresql/data
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [app-network]

  task-db:
    image: postgres:15
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret123}
    volumes:
      - task-pgdata:/var/lib/postgresql/data
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [app-network]

  activity-db:
    image: postgres:15
    environment:
      POSTGRES_DB: activitydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret123}
    volumes:
      - activity-pgdata:/var/lib/postgresql/data
      - ./activity-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [app-network]

  # ── Services ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on: [auth-service, task-service, activity-service, frontend]
    networks: [app-network]

  auth-service:
    build: ./auth-service
    environment:
      DATABASE_URL: postgres://admin:${DB_PASSWORD:-secret123}@auth-db:5432/authdb
      JWT_SECRET: ${JWT_SECRET:-engse207-secret}
      JWT_EXPIRES: ${JWT_EXPIRES:-1h}
      ACTIVITY_SERVICE_URL: http://activity-service:3000
    depends_on: [auth-db]
    networks: [app-network]

  task-service:
    build: ./task-service
    environment:
      DATABASE_URL: postgres://admin:${DB_PASSWORD:-secret123}@task-db:5432/taskdb
      JWT_SECRET: ${JWT_SECRET:-engse207-secret}
      ACTIVITY_SERVICE_URL: http://activity-service:3000
    depends_on: [task-db, activity-service]
    networks: [app-network]

  activity-service:
    build: ./activity-service
    environment:
      DATABASE_URL: postgres://admin:${DB_PASSWORD:-secret123}@activity-db:5432/activitydb
      JWT_SECRET: ${JWT_SECRET:-engse207-secret}
    depends_on: [activity-db]
    networks: [app-network]

  frontend:
    build: ./frontend
    networks: [app-network]

volumes:
  auth-pgdata:
  task-pgdata:
  activity-pgdata:

networks:
  app-network:
    driver: bridge
